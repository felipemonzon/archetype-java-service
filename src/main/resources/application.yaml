# ===================================================================
# GENERAL PROPERTIES
# ===================================================================
server:
  port: 8080
  servlet:
    context-path: /archetype-service
spring:
  application:
    name: archetype-service
  main.banner-mode: off
  datasource:
    driverClassName: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/archetypedb
    username: ENC(tJ2Z+tE7EUYGngObBR4r7YcpYcTe7S6HnYfLIL6EakHvbKlj5rpaBTD5PIQolyg4)
    password: ENC(rctQSg4WyAvoBF6jXmEo5XRAfiByqaS1Y4gF6hF7rpBOaJFFyDEWoz/ZA8Akn+Tn)
  jpa:
    naming-strategy: org.hibernate.cfg.ImprovedNamingStrategy
    hibernate.ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:/db/migration
    baseline-on-migrate: true
    baseline: 0

management:
  tracing:
    sampling:
      probability: 1.0
  endpoint:
    metrics:
      enabled: true
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: '*'
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
  prometheus:
    metrics:
      export:
        enabled: true
# ===================================================================
# SECURITY PROPERTIES
# ===================================================================
security:
  jwt:
    key: ENC(nX4/ePKkaKjuZC2g6DqQ7MykjBOvcj37o7hy/iUt+BB7fC42wjWYyvusmMHODrRTv6syt72JPU/AjvtNQesJO2C1QFdwPw6AcSaR4gBxBbjtZnm1IgZFWXfAzZen7jCkmJthg4QaPtHjYP+v1da41w==)
    lifeTime: 631138000000
    refreshLifeTime: 631138000000
  cors:
    origins:
      http://127.0.0.1:4200,
      http://localhost:4200,
      http://localhost:4201
# ===================================================================
# LOG PROPERTIES
# ===================================================================
logging:
  pattern:
    file: '[%X{data}%thread] [%X{X-B3-TraceId:-}] - %5p'
    console: "%p [${spring.application.name:}, %d{'yyyy-MM-dd HH:mm:ss,SSS',America/Mexico_City}, %C{1}:%M:%L, %X{mdc.uuid}, %m%n%ex{3}"
  level:
    com.moontech: DEBUG
    org:
      springframework.data: DEBUG
      hibernate:
        SQL: DEBUG
        type.descriptor.sql.BasicBinder: TRACE

# ===================================================================
# URL ENDPOINTS
# ===================================================================
api:
  uri:
    domain:
      users: /users
    data:
      modified: /{id}
      authentication: ${api.uri.domain.users}/authentication
      confirm: ${api.uri.domain.users}/confirm
      userConfirm: /confirm
      reset: /password/reset
      passwordForgot: ${api.uri.domain.users}/password/reset
  interceptorPath: "/**"
# ===================================================================
# SWAGGER PROPERTIES
# ===================================================================
swagger:
