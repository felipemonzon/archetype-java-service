# ===================================================================
# GENERAL PROPERTIES
# ===================================================================
server:
  port: 8080
  servlet:
    context-path: /archetype-service
spring:
  application:
    name: archetype-service
  main.banner-mode: off
# ===================================================================
# SECURITY PROPERTIES
# ===================================================================
security:
  jwt:
    key: PseudoSecret-Pseudosecret-IMPORTANT-Please-Use-Ur-Own-Key-IMPORTANT
    lifeTime: 6000
    refreshLifeTime: 6000
  cors:
    origins:
      http://127.0.0.1:4200,
      http://localhost:4200,
      http://localhost:4201
# ===================================================================
# LOG PROPERTIES
# ===================================================================
logging:
  pattern:
    file: '[%X{data}%thread] [%X{X-B3-TraceId:-}] - %5p'
    console: "%p [${spring.application.name:}, %d{'yyyy-MM-dd HH:mm:ss,SSS',America/Mexico_City}, %C{1}:%M:%L, %X{mdc.uuid}, %m%n%ex{3}"
  level:
    com.moontech: DEBUG
    org:
      springframework.data: DEBUG
      hibernate:
        SQL: DEBUG
        type.descriptor.sql.BasicBinder: TRACE

# ===================================================================
# URL ENDPOINTS
# ===================================================================
api:
  uri:
    domain:
      users: /users
    data:
      modified: /{id}
      authentication: ${api.uri.domain.users}/authentication
      confirm: ${api.uri.domain.users}/confirm
      userConfirm: /confirm
      reset: /password/reset
      passwordForgot: ${api.uri.domain.users}/password/reset
  interceptorPath: "/**"
# ===================================================================
# SWAGGER PROPERTIES
# ===================================================================
swagger:
  basePackage: com.moontech
  title: SERV-archetype-java-service
  descriptionApi: Archetype java service
  version: 1.0.0
  nameDeveloper: Felipe Monzón
  contactUrl: https://felipemonzon.github.io/
  emailDeveloper: felipemonzon2705@gmail.com
  licenceType: MIT LICENCE
  licenceUrl: https://github.com/felipemonzon/archetype-java-service/blob/main/LICENSE